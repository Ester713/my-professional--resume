name: Build And Push to ECR

on:
  push:
    # pull_requests:
    #   branches: ['main', 'dev']
    branches: [ 'main' ]


jobs:
  build_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Code
        uses: actions/checkout@v4

      # 1. FIXED: AWS Credentials step must happen BEFORE docker actions and be indented properly
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::964775859386:role/my-github-actions-role
          aws-region: us-east-1

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          severity: HIGH,CRITICAL
          exit-code: '0'

      # 2. FIXED: Added the required login step right after configuring credentials
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t 964775859386.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '964775859386.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # 3. READY TO FLY: Now that we are logged in, this step will complete with exit code 0!
      - name: push to ECR
        run: docker push 964775859386.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
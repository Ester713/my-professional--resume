name: Build And Push to ECR

on:
  push:
    # pull_requests:
    #   branches: ['main', 'dev']
    branches: [ 'main' ]

# 🚨 CRITICAL: Gives the runner permission to request the OIDC JWT token
permissions:
  id-token: write   
  contents: read    

jobs:
  build_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Code
        uses: actions/checkout@v4

      # 1. FIXED: Pointing directly to your real AWS IAM Role
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::964775859386:role/newgithub-action

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          severity: HIGH,CRITICAL
          exit-code: '0'

      # 2. Authenticate the local Docker daemon using the assumed role's tokens
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t 964775859386.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '964775859386.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # 3. Securely push the container layers to ECR
      - name: push to ECR
        run: docker push 964775859386.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
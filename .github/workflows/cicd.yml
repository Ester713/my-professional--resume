name: Production Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    name: Build, Cache, and Push Container
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push with GHA Layer Cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            esther1/cicd-portfolio:latest
            esther1/cicd-portfolio:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pipeline Housekeeping
        run: |
          echo "Build successful for Commit SHA: ${{ github.sha }}"
          echo "Layers optimized and exported to GitHub global cache storage."
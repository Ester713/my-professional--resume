name: My first pipeline
on:
    push: 
        branches: ["main"]
jobs:
    build:
        runs-on: ubuntu-latest # macos, windows-latest
        steps:
            - name: Clone the code
              uses: actions/checkout@v4
            - name: Build image
              run:
                docker build -t tai2026/cicd-portfolio .
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: tai2026
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Push image
              run:
                docker push tai2026/cicd-portfolio